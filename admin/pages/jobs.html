<!DOCTYPE html>
<html lang="vi">
<head>
  <script src="../js/auth-guard.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tin tuyển dụng — CVMS Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/jobs.css">
</head>
<body>
<div class="wrap">

  <aside class="sidebar">
    <div class="sb-logo"><h2>CVMS</h2><p>Recruitment System</p></div>
    <nav class="sb-nav">
      <div class="nav-section">Chính</div>
      <a class="nav-item" href="dashboard.html" data-page="dashboard.html"><i class="ti ti-home"></i> Dashboard</a>
      <a class="nav-item" href="companies.html" data-page="companies.html"><i class="ti ti-building"></i> Doanh nghiệp</a>
      <a class="nav-item" href="bookings.html" data-page="bookings.html"><i class="ti ti-receipt"></i> Yêu cầu DN</a>
      <a class="nav-item" href="jobs.html"       data-page="jobs.html"><i class="ti ti-briefcase"></i> Tin tuyển dụng</a>
      <a class="nav-item" href="candidates.html" data-page="candidates.html"><i class="ti ti-users"></i> Ứng viên</a>
      <a class="nav-item" href="pipeline.html"   data-page="pipeline.html"><i class="ti ti-layout-columns"></i> Pipeline</a>
      <div class="nav-section">Phân tích</div>
      <a class="nav-item" href="reports.html"    data-page="reports.html"><i class="ti ti-chart-bar"></i> Báo cáo</a>
      <div class="nav-section">Hệ thống</div>
      <a class="nav-item" href="settings.html"   data-page="settings.html"><i class="ti ti-settings"></i> Cài đặt</a>
    </nav>
        <div class="sb-bottom">
      <div class="avatar-row">
        <div class="avatar">NA</div>
        <div class="avatar-info"><p>Nguyễn Admin</p><span>HR Manager</span></div>
      </div>
      <button id="logoutBtn" class="logout-btn">
        <i class="ti ti-logout"></i> Đăng xuất
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Tin tuyển dụng</span>
      <div class="topbar-actions">
        <div class="search-box"><i class="ti ti-search"></i><input type="text" placeholder="Tìm kiếm..."></div>
        <button class="notif-btn" title="Thông báo"><i class="ti ti-bell"></i></button>
        <div class="avatar sm">NA</div>
      </div>
    </header>

    <div class="content">

      <div class="page-header">
        <div class="tab-row" style="margin-bottom:0;border:none">
          <div class="tab active">Đang tuyển (24)</div>
          <div class="tab">Bản nháp (6)</div>
          <div class="tab">Đã đóng (18)</div>
        </div>
        <button id="add-job-btn" class="add-btn" type="button" onclick="openJobModal()">
          <i class="ti ti-plus"></i> Tạo tin mới
        </button>
      </div>

      <div class="filter-row" style="margin-top:14px">
        <input id="searchJob" type="text" class="filter-select" style="width:220px" placeholder="Tìm kiếm tin...">
        <select id="companyFilter" class="filter-select">
          <option value="">Tất cả doanh nghiệp</option>
        </select>
        <select id="locationFilter" class="filter-select">
          <option value="">Tất cả chi nhánh</option>
          <option value="Hà Nội">Hà Nội</option><option value="Hồ Chí Minh">Hồ Chí Minh</option><option value="Đà Nẵng">Đà Nẵng</option>
        </select>
        <select id="deptFilter" class="filter-select">
          <option value="">Tất cả bộ phận</option>
          <option value="Engineering">Engineering</option><option value="Marketing">Marketing</option>
          <option value="Operations">Operations</option><option value="Design">Design</option>
          <option value="HR">HR</option><option value="Analytics">Analytics</option>
          <option value="Kinh doanh">Kinh doanh</option>
          <option value="Tài chính - Kế toán">Tài chính - Kế toán</option>
          <option value="Nhân sự">Nhân sự</option>
          <option value="Thiết kế - Sáng tạo">Thiết kế - Sáng tạo</option>
          <option value="Dịch vụ khách hàng">Dịch vụ khách hàng</option>
          <option value="Vận hành - Logistics">Vận hành - Logistics</option>
          <option value="Pháp lý - Tuân thủ">Pháp lý - Tuân thủ</option>
          <option value="Sản xuất - Kỹ thuật">Sản xuất - Kỹ thuật</option>
          <option value="Giáo dục - Đào tạo">Giáo dục - Đào tạo</option>
        </select>
        <select id="sortJob" class="filter-select">
          <option value="newest">Sắp xếp: Mới nhất</option>
          <option value="applicants">Nhiều ứng viên nhất</option>
          <option value="deadline">Hạn nộp gần nhất</option>
        </select>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Vị trí</th><th>Chi nhánh</th><th>SL</th>
              <th>Hạn nộp</th><th>Ứng viên</th><th>Trạng thái</th><th>Hành động</th>
            </tr>
          </thead>
          <tbody id="jobTableBody"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<script src="../../jss/data.js"></script>
<script src="../../jss/notif-ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/jobs.js"></script>
<script src="/jss/ai-chatbot-widget.js"></script>
</body>
</html>
