  <script src="../js/auth-guard.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ứng viên — CVMS Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/candidates.css">
</head>
<body>
<div class="wrap">

  <aside class="sidebar">
    <div class="sb-logo"><h2>CVMS</h2><p>Recruitment System</p></div>
    <nav class="sb-nav">
      <div class="nav-section">Chính</div>
      <a class="nav-item" href="dashboard.html" data-page="dashboard.html"><i class="ti ti-home"></i> Dashboard</a>
      <a class="nav-item" href="companies.html" data-page="companies.html"><i class="ti ti-building"></i> Doanh nghiệp</a>
      <a class="nav-item" href="bookings.html" data-page="bookings.html"><i class="ti ti-receipt"></i> Yêu cầu DN</a>
      <a class="nav-item" href="jobs.html"       data-page="jobs.html"><i class="ti ti-briefcase"></i> Tin tuyển dụng</a>
      <a class="nav-item" href="candidates.html" data-page="candidates.html"><i class="ti ti-users"></i> Ứng viên</a>
      <a class="nav-item" href="pipeline.html"   data-page="pipeline.html"><i class="ti ti-layout-columns"></i> Pipeline</a>
      <div class="nav-section">Phân tích</div>
      <a class="nav-item" href="reports.html"    data-page="reports.html"><i class="ti ti-chart-bar"></i> Báo cáo</a>
      <div class="nav-section">Hệ thống</div>
      <a class="nav-item" href="settings.html"   data-page="settings.html"><i class="ti ti-settings"></i> Cài đặt</a>
    </nav>
        <div class="sb-bottom">
      <div class="avatar-row">
        <div class="avatar">NA</div>
        <div class="avatar-info"><p>Nguyễn Admin</p><span>HR Manager</span></div>
      </div>
      <button id="logoutBtn" class="logout-btn">
        <i class="ti ti-logout"></i> Đăng xuất
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Quản lý Ứng viên</span>
      <div class="topbar-actions">
        <div class="search-box"><i class="ti ti-search"></i><input type="text" placeholder="Tìm kiếm..."></div>
        <button class="notif-btn" title="Thông báo"><i class="ti ti-bell"></i></button>
        <div class="avatar sm">NA</div>
      </div>
    </header>

    <div class="content">

      <div class="page-header">
        <span style="font-size:13px;color:var(--text-secondary)">187 ứng viên tổng cộng</span>
        <div class="filter-row" style="margin-bottom:0">
          <input id="searchCandidate" type="text" class="filter-select" style="width:200px" placeholder="Tìm tên, vị trí...">
          <select id="companyCandidateFilter" class="filter-select">
            <option value="">Tất cả doanh nghiệp</option>
          </select>
          <select id="statusFilter" class="filter-select">
            <option value="">Tất cả trạng thái</option>
            <option value="Mới nộp">Mới nộp</option>
            <option value="Đang xem xét">Đang xem xét</option>
            <option value="Phỏng vấn">Phỏng vấn</option>
            <option value="Đã offer">Đã Offer</option>
            <option value="Từ chối">Từ chối</option>
          </select>
          <select class="filter-select">
            <option>Tất cả vị trí</option>
            <option>Frontend Dev</option><option>Backend Dev</option>
            <option>Marketing</option><option>DevOps</option>
          </select>
          <button id="ai-batch-score" class="add-btn" type="button">
            <i class="ti ti-sparkles"></i> AI chấm CV mới
          </button>
        </div>
      </div>

      <div class="table-wrap" style="margin-top:14px">
        <table class="data-table">
          <thead>
            <tr>
              <th>Ứng viên</th><th>Vị trí ứng tuyển</th><th>Ngày nộp</th><th>Địa điểm</th><th>AI</th><th>Trạng thái</th><th>Ghi chú</th><th>CV</th><th>Cập nhật</th>
            </tr>
          </thead>
          <tbody id="candidateTableBody"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<script src="../../jss/data.js"></script>
<script src="../../jss/notif-ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/candidates.js"></script>
<script src="/jss/ai-chatbot-widget.js"></script>
</body>
</html>
