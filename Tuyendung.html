<html lang="vi">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="./css/Tuyendung.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="jss/data.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
    <div class="nav-brand">
        <div class="nav-logo">CVMS</div>
        <div class="nav-name">Tuyển dụng</div>
    </div>
    <div class="nav-links">
        <a href="Trangchu.html">Trang chủ</a>
        <a href="Vechungtoi.html">Về chúng tôi</a>

        <a href="login.html" class="btn btn-primary">Đăng ký</a>
    </div>
</nav>

<!-- MAIN CONTENT -->
<section class="jobs-section">
    <div class="jobs-header">
        <h1>Khám phá cơ hội việc làm</h1>
        <p class="subtitle">Hàng trăm vị trí đang tuyển dụng</p>
    </div>

    <div class="jobs-search">
        <input type="text" id="searchInput" placeholder="Tìm kiếm theo vị trí, kỹ năng, công ty...">
        <button onclick="searchJobs()"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm</button>
    </div>

    <div class="jobs-container">
        
        <!-- ================= FILTER SIDEBAR ================= -->
        <div class="jobs-filter">
            <h3>Bộ lọc kết quả</h3>

            <!-- Chi nhánh -->
            <div class="filter-group">
                <label>Chi nhánh tuyển dụng</label>
                <div class="checkbox-list" id="companyFilter">
                    <label><input type="checkbox" value="Hà Nội"> Hà Nội</label>
                    <label><input type="checkbox" value="Hồ Chí Minh"> Hồ Chí Minh</label>
                    <label><input type="checkbox" value="Đà Nẵng"> Đà Nẵng</label>
                    <label><input type="checkbox" value="Cần Thơ"> Cần Thơ</label>
                </div>
            </div>

            <!-- Ngành nghề -->
            <div class="filter-group">
                <label>Ngành nghề</label>
                <div class="checkbox-list" id="industryFilter">
                    <label><input type="checkbox" value="Công nghệ thông tin"> Công nghệ thông tin</label>
                    <label><input type="checkbox" value="Marketing"> Marketing</label>
                    <label><input type="checkbox" value="Kinh doanh"> Kinh doanh</label>
                    <label><input type="checkbox" value="Nhân sự"> Nhân sự</label>
                    <label><input type="checkbox" value="Tài chính"> Tài chính - Kế toán</label>
                    <label><input type="checkbox" value="Thiết kế"> Thiết kế - Sáng tạo</label>
                    <label><input type="checkbox" value="Dịch vụ khách hàng"> Dịch vụ khách hàng</label>
                    <label><input type="checkbox" value="Logistics"> Vận hành - Logistics</label>
                    <label><input type="checkbox" value="Pháp lý"> Pháp lý - Tuân thủ</label>
                    <label><input type="checkbox" value="Sản xuất"> Sản xuất - Kỹ thuật</label>
                    <label><input type="checkbox" value="Giáo dục"> Giáo dục - Đào tạo</label>
                    <label><input type="checkbox" value="Dữ liệu"> Dữ liệu - Phân tích</label>
                </div>
            </div>

            <!-- Cấp bậc -->
            <div class="filter-group">
                <label>Cấp bậc</label>
                <div class="checkbox-list" id="levelFilter">
                    <label><input type="checkbox" value="Mới tốt nghiệp"> Mới tốt nghiệp</label>
                    <label><input type="checkbox" value="Nhân viên"> Nhân viên</label>
                    <label><input type="checkbox" value="Thực tập"> Thực tập</label>
                    <label><input type="checkbox" value="Trưởng khối"> Trưởng khối</label>
                    <label><input type="checkbox" value="Trưởng khối hoặc cao hơn"> Trưởng khối hoặc cao hơn</label>
                </div>
            </div>

            <!-- Thời gian làm việc -->
            <div class="filter-group">
                <label>Thời gian làm việc</label>
                <div class="checkbox-list" id="workTypeFilter">
                    <label><input type="checkbox" value="Bán thời gian"> Bán thời gian</label>
                    <label><input type="checkbox" value="Thời vụ"> Thời vụ</label>
                    <label><input type="checkbox" value="Toàn thời gian"> Toàn thời gian</label>
                </div>
            </div>

            <!-- Lương -->
            <div class="filter-group">
                <label>Lương tháng</label>
                <div class="salary-range">
                    <input type="number" id="salaryFrom" placeholder="Từ" oninput="applyFilters()">
                    <span>-</span>
                    <input type="number" id="salaryTo" placeholder="Đến" oninput="applyFilters()">
                </div>
            </div>

            <button onclick="resetAllFilters()" class="reset-btn">Xóa tất cả bộ lọc</button>
        </div>

        <!-- JOB LIST -->
        <div class="jobs-list" id="jobsList"></div>
    </div>
</section>

<footer id="contact">
    <div class="footer-brand">CVMS Recruitment System</div>
    <p>© 2026 All Rights Reserved</p>
</footer>

<script src="./jss/Tuyendung.js"></script>
<script src="/jss/ai-chatbot-widget.js"></script>
</body>
</html>
