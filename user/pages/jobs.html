<!DOCTYPE html>
<html lang="vi">
<head>
  <script src="../js/auth-guard-user.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Việc Làm — CVMS Ứng Viên</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
  <link rel="stylesheet" href="../../admin/css/base.css">
  <link rel="stylesheet" href="../../admin/css/components.css">
  <link rel="stylesheet" href="../css/user.css">
</head>
<body>
<div class="wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo">
      <h2>CVMS</h2>
      <p>Candidate Portal</p>
    </div>
    <nav class="sb-nav">
      <div class="nav-section">Chính</div>
      <a class="nav-item" href="dashboard.html" data-page="dashboard.html"><i class="ti ti-home"></i> Tổng quan</a>
      <a class="nav-item" href="jobs.html"       data-page="jobs.html"><i class="ti ti-briefcase"></i> Việc làm</a>
      <a class="nav-item" href="profile.html"    data-page="profile.html"><i class="ti ti-user"></i> Hồ sơ của tôi</a>
    </nav>
    <div class="sb-bottom">
      <div class="avatar-row">
        <div class="avatar">UV</div>
        <div class="avatar-info"><p>Ứng viên</p><span>user@email.com</span></div>
      </div>
      <button id="logoutBtn" class="logout-btn">
        <i class="ti ti-logout"></i> Đăng xuất
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Tìm Việc Làm</span>
      <div class="topbar-actions">
        <div class="avatar sm">UV</div>
      </div>
    </header>

    <div class="content">

      <div class="page-header">
        <div>
          <div style="font-size:20px;font-weight:700;margin-bottom:4px">Khám phá cơ hội nghề nghiệp</div>
          <div style="color:var(--text-secondary);font-size:13px">Tìm vị trí phù hợp và ứng tuyển ngay</div>
        </div>
        <span id="jobs-count" class="badge badge-blue" style="font-size:12px;padding:5px 14px">8 vị trí</span>
      </div>

      <!-- Search + filter -->
      <div class="jobs-searchbar">
        <input type="text" id="job-search" placeholder="🔍  Tìm theo vị trí, công ty, kỹ năng...">
        <select id="job-loc">
          <option value="">Tất cả địa điểm</option>
          <option value="Hà Nội">Hà Nội</option>
          <option value="Hồ Chí Minh">Hồ Chí Minh</option>
          <option value="Đà Nẵng">Đà Nẵng</option>
          <option value="Cần Thơ">Cần Thơ</option>
          <option value="Bình Dương">Bình Dương</option>
        </select>
        <select id="job-dept">
          <option value="">Tất cả ngành nghề</option>
        </select>
        <button id="saved-only" type="button" class="secondary-btn-u" style="width:auto;padding:9px 13px">
          <i class="ti ti-bookmark"></i> Việc đã lưu
        </button>
      </div>

      <div id="dept-chips" class="dept-chips"></div>

      <!-- Jobs grid -->
      <div class="jobs-grid" id="jobs-grid">
        <!-- render by jobs.js -->
      </div>

    </div>
  </main>
</div>


<script src="../../jss/data.js"></script>
<script src="../../jss/notif-ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/jobs.js"></script>
<script src="/jss/ai-chatbot-widget.js"></script>
</body>
</html>
