<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CVMS - Đăng nhập</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
}

.container{
    width:350px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <h2>Đăng nhập CVMS</h2>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required>

        <input
            type="password"
            id="password"
            placeholder="Mật khẩu"
            required>

        <button type="submit">
            Đăng nhập
        </button>

    </form>

    <p>
        Chưa có tài khoản?
        <a href="register.html">Đăng ký</a>
    </p>

</div>

<script>

document.getElementById("loginForm").onsubmit = function(e){

    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email=="admin@cvms.com" && password=="123456"){
        alert("Đăng nhập Admin thành công");
        location.href="admin.html";
    }

    else if(email=="candidate@gmail.com" && password=="123456"){
        alert("Đăng nhập Ứng viên thành công");
        location.href="candidate.html";
    }

    else if(email=="company@gmail.com" && password=="123456"){
        alert("Đăng nhập Doanh nghiệp thành công");
        location.href="company.html";
    }

    else{
        alert("Sai email hoặc mật khẩu!");
    }
}

</script>

</body>
</html>
